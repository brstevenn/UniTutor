<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniTutor</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    /* ============================================================
       VARIABLES & BASE
    ============================================================ */
    :root {
      --primary:       #4F46E5;
      --primary-dark:  #3730A3;
      --secondary:     #7C3AED;
      --grad:          linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      --card-shadow:   0 4px 6px -1px rgba(0,0,0,.08), 0 2px 4px -1px rgba(0,0,0,.04);
      --hover-shadow:  0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
      --bg:            #F1F5F9;
    }

    body { background: var(--bg); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

    /* ============================================================
       ANIMATIONS
    ============================================================ */
    .fade-in { animation: fadeIn .3s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       LOGIN
    ============================================================ */
    .login-bg {
      min-height: 100vh;
      background: var(--grad);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: #fff;
      border-radius: 1.25rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,.35);
      padding: 2.5rem 2rem;
      width: 100%; max-width: 430px;
    }
    .brand-logo {
      font-size: 1.8rem; font-weight: 900; letter-spacing: -.5px;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ============================================================
       NAVBAR
    ============================================================ */
    .navbar-main { background: var(--grad); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .navbar-brand-custom { font-size: 1.4rem; font-weight: 800; color: #fff !important; letter-spacing: -.3px; }

    /* ============================================================
       SIDEBAR NAV
    ============================================================ */
    .sidebar { background: #fff; border-radius: 1rem; box-shadow: var(--card-shadow); overflow: hidden; }
    .nav-side .nav-link {
      color: #64748B; padding: .8rem 1.1rem;
      border-left: 3px solid transparent;
      transition: all .18s; font-weight: 500; font-size: .9rem;
      white-space: nowrap;
    }
    .nav-side .nav-link i { margin-right: .45rem; width: 1.1rem; text-align: center; }
    .nav-side .nav-link:hover  { color: var(--primary); background: #EEF2FF; border-left-color: var(--primary); }
    .nav-side .nav-link.active { color: var(--primary); background: #EEF2FF; border-left-color: var(--primary); font-weight: 700; }

    @media (max-width: 767px) {
      .nav-side { flex-direction: row !important; overflow-x: auto; }
      .nav-side .nav-link { border-left: none !important; border-bottom: 3px solid transparent; font-size: .8rem; }
      .nav-side .nav-link.active, .nav-side .nav-link:hover { border-bottom-color: var(--primary); }
    }

    /* ============================================================
       CARDS
    ============================================================ */
    .session-card {
      border: none; border-radius: 1rem;
      box-shadow: var(--card-shadow);
      transition: transform .2s, box-shadow .2s;
    }
    .session-card:hover { transform: translateY(-3px); box-shadow: var(--hover-shadow); }
    .session-card .card-header {
      background: var(--grad); color: #fff;
      border-radius: 1rem 1rem 0 0 !important;
      padding: .9rem 1.1rem;
    }

    .stat-card { border: none; border-radius: 1rem; box-shadow: var(--card-shadow); }
    .icon-box {
      width: 2.75rem; height: 2.75rem; border-radius: .75rem;
      display: flex; align-items: center; justify-content: center; font-size: 1.15rem;
    }

    /* ============================================================
       BADGES
    ============================================================ */
    .badge-presencial { background: #DBEAFE; color: #1D4ED8; }
    .badge-online     { background: #D1FAE5; color: #065F46; }

    /* ============================================================
       SEARCH
    ============================================================ */
    .search-input {
      border-radius: 2rem; border: 2px solid #E2E8F0;
      padding-left: 1rem; transition: border-color .2s;
    }
    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 .25rem rgba(79,70,229,.15);
    }

    /* ============================================================
       PROFILE AVATAR
    ============================================================ */
    .avatar {
      background: var(--grad);
      color: #fff; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }

    /* ============================================================
       TOASTS
    ============================================================ */
    #toastContainer { position: fixed; top: 1rem; right: 1rem; z-index: 99999; }

    /* ============================================================
       EMPTY STATE
    ============================================================ */
    .empty-state {
      padding: 3.5rem 1rem; text-align: center; color: #94A3B8;
    }
    .empty-state i { font-size: 3.5rem; margin-bottom: .75rem; display: block; }

    /* ============================================================
       MODAL HEADER GRADIENT
    ============================================================ */
    .modal-header-grad { background: var(--grad); }
    .modal-header-danger { background: #DC2626; }

    /* ============================================================
       MISC
    ============================================================ */
    .spots-full { text-decoration: line-through; opacity: .6; }
    .table thead th { font-size: .8rem; text-transform: uppercase; letter-spacing: .04em; color: #64748B; }
  </style>
</head>
<body>

<!-- ============================================================
     APP ROOT
============================================================ -->
<div id="app"></div>

<!-- Toast container -->
<div id="toastContainer"></div>

<!-- Bootstrap 5 JS Bundle (Popper included) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
"use strict";

/* ================================================================
   DUMMY DATA
================================================================ */

const USERS = [
  { id: 1, name: "Ana García",      email: "student@test.com", password: "1234", role: "student" },
  { id: 2, name: "Carlos Mendoza",  email: "tutor@test.com",   password: "1234", role: "tutor"   },
  { id: 3, name: "Valeria Ríos",    email: "valeria@test.com", password: "1234", role: "student" },
];

const TUTORS = [
  { id: 1, name: "Carlos Mendoza", email: "tutor@test.com",   specialty: "Matemáticas",  rating: 4.8, reviews: 24 },
  { id: 2, name: "Laura Sánchez",  email: "laura@tutor.com",  specialty: "Programación", rating: 4.9, reviews: 37 },
  { id: 3, name: "Marcos Herrera", email: "marcos@tutor.com", specialty: "Física",       rating: 4.6, reviews: 18 },
];

const SUBJECTS = [
  "Cálculo I", "Álgebra Lineal", "Programación Orientada a Objetos",
  "Física General", "Estructuras de Datos", "Bases de Datos",
];

const DAYS = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];

/* ================================================================
   STATE  (mutable)
================================================================ */

const state = {
  currentUser:    null,       // logged-in user object
  view:           "login",    // "login" | "dashboard"
  section:        "search",   // "search" | "mybookings" | "profile" | "manage"
  sessions:       [],         // all tutoring sessions
  bookings:       [],         // reservations for the current user
  searchQuery:    "",
  filterSubject:  "",
  filterDay:      "",
  filterModality: "",
  editSessionId:  null,
};

/* Seed sessions */
state.sessions = [
  {
    id: 1, subject: "Cálculo I", tutorName: "Carlos Mendoza",
    day: "Lunes",     time: "10:00 - 11:30", modality: "Presencial",
    location: "Sala A-201",
    spots: 5, totalSpots: 5,
    description:  "Revisión de límites, derivadas e integrales. Trae tus apuntes y ejercicios pendientes.",
    requirements: "Haber cursado Pre-cálculo o equivalente.",
    duration:     "90 minutos",
  },
  {
    id: 2, subject: "Álgebra Lineal", tutorName: "Carlos Mendoza",
    day: "Miércoles", time: "14:00 - 15:30", modality: "Online",
    location: "https://meet.google.com/alg-lin",
    spots: 3, totalSpots: 6,
    description:  "Vectores, matrices y transformaciones lineales con ejemplos en tiempo real.",
    requirements: "Geometría analítica básica.",
    duration:     "90 minutos",
  },
  {
    id: 3, subject: "Programación Orientada a Objetos", tutorName: "Laura Sánchez",
    day: "Martes",    time: "16:00 - 17:30", modality: "Online",
    location: "https://zoom.us/j/123456789",
    spots: 4, totalSpots: 8,
    description:  "Principios SOLID, patrones de diseño, herencia y polimorfismo con Java/Python.",
    requirements: "Conocer algún lenguaje de programación.",
    duration:     "90 minutos",
  },
  {
    id: 4, subject: "Estructuras de Datos", tutorName: "Laura Sánchez",
    day: "Jueves",    time: "09:00 - 10:30", modality: "Presencial",
    location: "Lab Computación B-105",
    spots: 2, totalSpots: 5,
    description:  "Listas enlazadas, árboles, grafos y algoritmos de búsqueda/ordenamiento.",
    requirements: "POO básica y C++ o Java.",
    duration:     "90 minutos",
  },
  {
    id: 5, subject: "Física General", tutorName: "Marcos Herrera",
    day: "Viernes",   time: "11:00 - 12:30", modality: "Presencial",
    location: "Sala C-302",
    spots: 6, totalSpots: 8,
    description:  "Mecánica newtoniana, cinemática y dinámica. Resolución de problemas paso a paso.",
    requirements: "Cálculo básico.",
    duration:     "90 minutos",
  },
  {
    id: 6, subject: "Bases de Datos", tutorName: "Laura Sánchez",
    day: "Lunes",     time: "18:00 - 19:30", modality: "Online",
    location: "https://meet.google.com/db-session",
    spots: 0, totalSpots: 6,
    description:  "Diseño ER, normalización, SQL avanzado y procedimientos almacenados.",
    requirements: "Conocimientos básicos de SQL.",
    duration:     "90 minutos",
  },
];

/* ================================================================
   UTILITIES
================================================================ */

/** Show a Bootstrap toast notification */
function showToast(msg, type = "success") {
  const icons = {
    success: "bi-check-circle-fill",
    danger:  "bi-x-circle-fill",
    warning: "bi-exclamation-triangle-fill",
    info:    "bi-info-circle-fill",
  };
  const colors = { success: "bg-success", danger: "bg-danger", warning: "bg-warning", info: "bg-info" };
  const id = "toast-" + Date.now();
  document.getElementById("toastContainer").insertAdjacentHTML("beforeend", `
    <div id="${id}" class="toast align-items-center text-white ${colors[type]} border-0" role="alert" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body"><i class="bi ${icons[type]} me-2"></i>${msg}</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>`);
  const el = document.getElementById(id);
  const t = new bootstrap.Toast(el, { delay: 3500 });
  t.show();
  el.addEventListener("hidden.bs.toast", () => el.remove());
}

/** Simulates a delayed async API response */
function api(ms = 450) {
  return new Promise(r => setTimeout(r, ms));
}

/** Returns initials from a full name */
function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join("").toUpperCase().slice(0, 2);
}

/** Closes any open Bootstrap modals */
function closeModals() {
  document.querySelectorAll(".modal.show").forEach(m => {
    const inst = bootstrap.Modal.getInstance(m);
    if (inst) inst.hide();
  });
}

/** Read a form's fields into a plain object */
function formData(formId) {
  const obj = {};
  new FormData(document.getElementById(formId)).forEach((v, k) => (obj[k] = v));
  return obj;
}

/* ================================================================
   AUTH
================================================================ */

function doLogin(email, password) {
  // Check against dummy users first
  let user = USERS.find(u => u.email === email && u.password === password);
  if (!user) {
    // Fallback: derive role from email keyword
    if (!email) return null;
    const role = email.toLowerCase().includes("tutor") ? "tutor" : "student";
    user = { id: Date.now(), name: email.split("@")[0], email, role };
  }
  return user;
}

function saveSession(user) {
  state.currentUser = user;
  state.bookings    = [];
  localStorage.setItem("ut_user", JSON.stringify(user));
}

function logout() {
  state.currentUser    = null;
  state.bookings       = [];
  state.section        = "search";
  state.searchQuery    = "";
  state.filterSubject  = "";
  state.filterDay      = "";
  state.filterModality = "";
  localStorage.removeItem("ut_user");
  navigate_view("login");
}

function restoreSession() {
  const raw = localStorage.getItem("ut_user");
  if (raw) {
    state.currentUser = JSON.parse(raw);
    state.view = "dashboard";
  }
}

/* ================================================================
   SESSION (TUTORING) ACTIONS
================================================================ */

/** Book a tutoring session */
function bookSession(sessionId) {
  const sess = state.sessions.find(s => s.id === sessionId);
  if (!sess) return;
  if (sess.spots <= 0) { showToast("No hay cupos disponibles.", "warning"); return; }
  const already = state.bookings.find(b => b.sessionId === sessionId && b.status !== "Cancelada");
  if (already) { showToast("Ya tienes esta tutoría reservada.", "warning"); return; }

  api(550).then(() => {
    sess.spots--;
    state.bookings.push({
      id:        Date.now(),
      sessionId: sess.id,
      subject:   sess.subject,
      tutorName: sess.tutorName,
      day:       sess.day,
      time:      sess.time,
      modality:  sess.modality,
      location:  sess.location,
      status:    "Reservada",
      bookedAt:  new Date().toLocaleDateString("es-ES"),
    });
    showToast(`¡Tutoría de <strong>${sess.subject}</strong> reservada!`, "success");
    closeModals();
    renderDashboard();
  });
}

/** Cancel an existing booking */
function cancelBooking(bookingId) {
  const bk = state.bookings.find(b => b.id === bookingId);
  if (!bk) return;
  api(350).then(() => {
    bk.status = "Cancelada";
    const sess = state.sessions.find(s => s.id === bk.sessionId);
    if (sess) sess.spots++;
    showToast("Reserva cancelada.", "warning");
    renderDashboard();
  });
}

/** Create a new session (tutor only) */
function createSession(data) {
  api(450).then(() => {
    state.sessions.push({
      id:           Date.now(),
      subject:      data.subject,
      tutorName:    state.currentUser.name,
      day:          data.day,
      time:         data.time,
      modality:     data.modality,
      location:     data.location,
      spots:        +data.spots,
      totalSpots:   +data.spots,
      description:  data.description || "",
      requirements: data.requirements || "",
      duration:     data.duration || "90 minutos",
    });
    showToast(`Tutoría de <strong>${data.subject}</strong> creada.`, "success");
    renderDashboard();
  });
}

/** Update an existing session (tutor only) */
function updateSession(id, data) {
  const sess = state.sessions.find(s => s.id === id);
  if (!sess) return;
  api(400).then(() => {
    Object.assign(sess, {
      subject:      data.subject,
      day:          data.day,
      time:         data.time,
      modality:     data.modality,
      location:     data.location,
      spots:        +data.spots,
      description:  data.description || sess.description,
      requirements: data.requirements || sess.requirements,
      duration:     data.duration || sess.duration,
    });
    showToast("Tutoría actualizada.", "info");
    state.editSessionId = null;
    renderDashboard();
  });
}

/** Delete a session (tutor only) */
function deleteSession(id) {
  api(350).then(() => {
    state.sessions = state.sessions.filter(s => s.id !== id);
    state.bookings = state.bookings.filter(b => b.sessionId !== id);
    showToast("Tutoría eliminada.", "danger");
    renderDashboard();
  });
}

/* ================================================================
   NAVIGATION
================================================================ */

function navigate_view(view) {
  state.view = view;
  render();
}

function navigate(section) {
  state.section = section;
  renderDashboard();
}

/* ================================================================
   MAIN RENDER DISPATCHER
================================================================ */

function render() {
  document.getElementById("app").innerHTML =
    state.view === "login" ? buildLogin() : buildDashboard();
  state.view === "login" ? attachLoginHandlers() : attachDashboardHandlers();
}

/* ================================================================
   LOGIN VIEW
================================================================ */

function buildLogin() {
  return `
  <div class="login-bg">
    <div class="login-card fade-in">
      <div class="text-center mb-4">
        <div class="brand-logo mb-1"><i class="bi bi-mortarboard-fill me-1"></i>UniTutor</div>
        <p class="text-muted small mb-0">Tu plataforma de tutorías universitarias</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Correo electrónico</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
            <input id="loginEmail"    type="email"    class="form-control border-start-0"
              placeholder="correo@universidad.edu" value="student@test.com" required />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold small">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
            <input id="loginPassword" type="password" class="form-control border-start-0 border-end-0"
              placeholder="••••••••" value="1234" required />
            <button type="button" class="btn btn-light border" id="togglePwd">
              <i class="bi bi-eye" id="togglePwdIcon"></i>
            </button>
          </div>
        </div>

        <div id="loginErr" class="alert alert-danger py-2 d-none small">
          <i class="bi bi-exclamation-circle me-1"></i>Correo o contraseña incorrectos.
        </div>

        <button type="submit" class="btn w-100 text-white fw-semibold py-2"
          style="background:var(--grad);border-radius:.6rem">
          <span id="loginBtnTxt">Iniciar sesión</span>
          <span id="loginSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
        </button>
      </form>

      <hr class="my-4" />
      <div class="text-center text-muted small">
        <p class="mb-1"><i class="bi bi-person me-1"></i><strong>Estudiante:</strong> student@test.com / 1234</p>
        <p class="mb-0"><i class="bi bi-mortarboard me-1"></i><strong>Tutor:</strong> tutor@test.com / 1234</p>
      </div>
    </div>
  </div>`;
}

function attachLoginHandlers() {
  /* Toggle password visibility */
  document.getElementById("togglePwd").addEventListener("click", () => {
    const inp  = document.getElementById("loginPassword");
    const icon = document.getElementById("togglePwdIcon");
    inp.type   = inp.type === "password" ? "text" : "password";
    icon.className = `bi bi-eye${inp.type === "text" ? "-slash" : ""}`;
  });

  /* Form submit */
  document.getElementById("loginForm").addEventListener("submit", e => {
    e.preventDefault();
    const email    = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    const errDiv   = document.getElementById("loginErr");
    const spinner  = document.getElementById("loginSpinner");
    const btnTxt   = document.getElementById("loginBtnTxt");

    spinner.classList.remove("d-none");
    btnTxt.textContent = "Verificando…";
    errDiv.classList.add("d-none");

    api(800).then(() => {
      const user = doLogin(email, password);
      if (user) {
        saveSession(user);
        navigate_view("dashboard");
      } else {
        spinner.classList.add("d-none");
        btnTxt.textContent = "Iniciar sesión";
        errDiv.classList.remove("d-none");
      }
    });
  });
}

/* ================================================================
   DASHBOARD SHELL
================================================================ */

function buildDashboard() {
  const u = state.currentUser;
  const isT = u.role === "tutor";

  const navItems = [
    { id: "search",     icon: "bi-search",         label: "Buscar Tutorías" },
    { id: "mybookings", icon: "bi-calendar-check",  label: "Mis Tutorías"   },
    { id: "profile",    icon: "bi-person-circle",   label: "Perfil"         },
    ...(isT ? [{ id: "manage", icon: "bi-gear", label: "Gestionar" }] : []),
  ].map(it => `
    <li class="nav-item">
      <a href="#" class="nav-link ${state.section === it.id ? "active" : ""}"
         onclick="navigate('${it.id}');return false;">
        <i class="bi ${it.icon}"></i>${it.label}
      </a>
    </li>`).join("");

  const sectionMap = {
    search:     buildSearch,
    mybookings: buildMyBookings,
    profile:    buildProfile,
    manage:     buildManage,
  };
  const sectionHTML = (sectionMap[state.section] || buildSearch)();

  return `
  <!-- NAVBAR -->
  <nav class="navbar navbar-main py-2 sticky-top">
    <div class="container-fluid px-3 px-md-4">
      <span class="navbar-brand-custom"><i class="bi bi-mortarboard-fill me-2"></i>UniTutor</span>
      <div class="d-flex align-items-center gap-2">
        <span class="badge bg-white text-dark px-3 py-2 rounded-pill shadow-sm">
          <i class="bi bi-person-fill me-1 text-primary"></i>${u.name}
          <span class="badge ms-1 rounded-pill ${isT ? "bg-warning text-dark" : "bg-primary"}"
                style="font-size:.6rem">${isT ? "Tutor" : "Estudiante"}</span>
        </span>
        <button class="btn btn-light btn-sm shadow-sm" onclick="logout()" title="Cerrar sesión">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- MAIN LAYOUT -->
  <div class="container-fluid py-4 px-3 px-md-4">
    <div class="row g-4">
      <!-- Sidebar -->
      <div class="col-12 col-md-3 col-xl-2">
        <div class="sidebar">
          <ul class="nav flex-column nav-side">${navItems}</ul>
        </div>
      </div>
      <!-- Content -->
      <div class="col-12 col-md-9 col-xl-10">
        <div class="fade-in">${sectionHTML}</div>
      </div>
    </div>
  </div>

  ${buildModals()}`;
}

function renderDashboard() {
  document.getElementById("app").innerHTML = buildDashboard();
  attachDashboardHandlers();
}

function attachDashboardHandlers() {
  /* Create-session form */
  const cf = document.getElementById("createSessionForm");
  if (cf) {
    cf.onsubmit = e => {
      e.preventDefault();
      const data = formData("createSessionForm");
      createSession(data);
      bootstrap.Modal.getInstance(document.getElementById("createModal"))?.hide();
      cf.reset();
    };
  }
  /* Edit-session form */
  const ef = document.getElementById("editSessionForm");
  if (ef) {
    ef.onsubmit = e => {
      e.preventDefault();
      const data = formData("editSessionForm");
      updateSession(state.editSessionId, data);
      bootstrap.Modal.getInstance(document.getElementById("editModal"))?.hide();
    };
  }

    ${statCard("#FFF7ED","","bi-grid-fill",SUBJECTS.length,"Materias","#F97316")}

  </div>

  <!-- Filters -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-3">
      <div class="row g-2">
        <div class="col-12 col-md-5">

            <span class="input-group-text bg-light"><i class="bi bi-search text-muted"></i></span>
            <input id="searchInput" type="text" class="form-control search-input"
              placeholder="Buscar materia, tutor…" value="${state.searchQuery}"

        </div>
        <div class="col-4 col-md-2">
          <select class="form-select" onchange="handleFilter('subject',this.value)">

function statCard(bg, textClass, icon, value, label, color) {
  const iconStyle = color ? `style="color:${color}"` : "";
  return `
  <div class="col-6 col-md-3">
    <div class="stat-card card p-3">
      <div class="d-flex align-items-center gap-3">
        <div class="icon-box" style="background:${bg}">
          <i class="bi ${icon} ${textClass}" ${iconStyle}></i>
        </div>
        <div>
          <div class="fw-bold fs-5">${value}</div>
          <div class="text-muted small">${label}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function buildSessionCard(sess) {
  const isBooked  = state.bookings.find(b => b.sessionId === sess.id && b.status !== "Cancelada");
  const spotsClr  = sess.spots === 0 ? "danger" : sess.spots <= 2 ? "warning" : "success";
  const modBadge  = modalityBadge(sess.modality);

  const actionBtn = isBooked
    ? `<button class="btn btn-success btn-sm" disabled><i class="bi bi-check2 me-1"></i>Reservada</button>`
    : sess.spots > 0
      ? `<button class="btn btn-primary btn-sm flex-grow-1" onclick="bookSession(${sess.id})">
           <i class="bi bi-bookmark-plus me-1"></i>Reservar
         </button>`
      : `<button class="btn btn-secondary btn-sm" disabled>
           <i class="bi bi-x-circle me-1"></i>Sin cupos
         </button>`;

  return `
  <div class="col-12 col-sm-6 col-xl-4">
    <div class="session-card card h-100">
      <div class="card-header d-flex justify-content-between align-items-start gap-2">
        <div class="overflow-hidden">
          <h6 class="mb-0 fw-bold text-truncate">${sess.subject}</h6>
          <small class="opacity-80"><i class="bi bi-person me-1"></i>${sess.tutorName}</small>
        </div>
        ${modBadge}
      </div>
      <div class="card-body pb-2">
        <div class="d-flex flex-wrap gap-1 mb-3">
          <span class="badge bg-light text-dark border">
            <i class="bi bi-calendar3 me-1"></i>${sess.day}
          </span>
          <span class="badge bg-light text-dark border">
            <i class="bi bi-clock me-1"></i>${sess.time}
          </span>
        </div>
        <div class="d-flex align-items-center justify-content-between">
          <small class="text-muted text-truncate me-2">
            <i class="bi bi-geo-alt me-1"></i>${sess.modality === "Presencial" ? sess.location : "Videollamada"}
          </small>
          <span class="badge bg-${spotsClr}-subtle text-${spotsClr} border border-${spotsClr}-subtle text-nowrap">
            <i class="bi bi-people me-1"></i>${sess.spots}/${sess.totalSpots}
          </span>
        </div>
      </div>
      <div class="card-footer bg-transparent border-top-0 pt-0 pb-3 px-3">
        <div class="d-flex gap-2">
          <button class="btn btn-outline-primary btn-sm flex-grow-1"
                  onclick="openDetail(${sess.id})">
            <i class="bi bi-eye me-1"></i>Ver detalle
          </button>
          ${actionBtn}
        </div>
      </div>
    </div>
  </div>`;
}

function modalityBadge(modality) {
  return modality === "Presencial"
    ? `<span class="badge badge-presencial text-nowrap"><i class="bi bi-geo-alt me-1"></i>Presencial</span>`
    : `<span class="badge badge-online text-nowrap"><i class="bi bi-wifi me-1"></i>Online</span>`;
}

/* Filter helpers */
function filteredSessions() {
  const q = state.searchQuery.toLowerCase();
  return state.sessions.filter(s => {
    const matchQ  = !q || s.subject.toLowerCase().includes(q) || s.tutorName.toLowerCase().includes(q) || s.day.toLowerCase().includes(q);
    const matchSu = !state.filterSubject  || s.subject  === state.filterSubject;
    const matchD  = !state.filterDay      || s.day      === state.filterDay;
    const matchM  = !state.filterModality || s.modality === state.filterModality;
    return matchQ && matchSu && matchD && matchM;
  });
}

function handleSearch(value) {
  state.searchQuery = value;
  refreshGrid();
}

function handleFilter(type, value) {
  if (type === "subject")  state.filterSubject  = value;
  if (type === "day")      state.filterDay      = value;
  if (type === "modality") state.filterModality = value;
  refreshGrid();
}

function refreshGrid() {
  const grid = document.getElementById("sessionsGrid");
  if (!grid) return;
  const filtered = filteredSessions();
  grid.innerHTML = filtered.length
    ? filtered.map(buildSessionCard).join("")
    : `<div class="col-12">
         <div class="empty-state bg-white rounded-3 shadow-sm">
           <i class="bi bi-search"></i>
           <h5>No se encontraron tutorías</h5>
           <button class="btn btn-outline-primary btn-sm mt-1" onclick="clearFilters()">
             <i class="bi bi-x-circle me-1"></i>Limpiar filtros
           </button>
         </div>
       </div>`;
}

function clearFilters() {
  state.searchQuery    = "";
  state.filterSubject  = "";
  state.filterDay      = "";
  state.filterModality = "";
  navigate("search");
}

/* Open edit modal */
function openEdit(id) {
  const sess = state.sessions.find(s => s.id === id);
  if (!sess) return;
  state.editSessionId = id;

  const f = document.getElementById("editSessionForm");
  if (!f) return;
  f.querySelector("[name=subject]").value      = sess.subject;
  f.querySelector("[name=day]").value          = sess.day;
  f.querySelector("[name=time]").value         = sess.time;
  f.querySelector("[name=modality]").value     = sess.modality;
  f.querySelector("[name=location]").value     = sess.location;
  f.querySelector("[name=spots]").value        = sess.spots;
  f.querySelector("[name=description]").value  = sess.description;
  f.querySelector("[name=requirements]").value = sess.requirements;
  f.querySelector("[name=duration]").value     = sess.duration;

  new bootstrap.Modal(document.getElementById("editModal")).show();
}

/* Ask confirmation before deleting */
function askDelete(id) {
  const sess = state.sessions.find(s => s.id === id);
  if (!sess) return;
  document.getElementById("deleteLabel").textContent = sess.subject;
  document.getElementById("confirmDeleteBtn").onclick = () => {
    deleteSession(id);
    bootstrap.Modal.getInstance(document.getElementById("deleteModal"))?.hide();
  };
  new bootstrap.Modal(document.getElementById("deleteModal")).show();
}

function buildModals() {
  const subjectOpts = SUBJECTS.map(s => `<option value="${s}">${s}</option>`).join("");
  const dayOpts     = DAYS.map(d    => `<option value="${d}">${d}</option>`).join("");

  const sessionFields = `
  <div class="row g-3">
    <div class="col-12">
      <label class="form-label fw-semibold small">Materia <span class="text-danger">*</span></label>
      <select name="subject" class="form-select" required>
        <option value="">Selecciona…</option>${subjectOpts}
      </select>
    </div>
    <div class="col-6">
      <label class="form-label fw-semibold small">Día <span class="text-danger">*</span></label>
      <select name="day" class="form-select" required>
        <option value="">Selecciona…</option>${dayOpts}
      </select>
    </div>
    <div class="col-6">
      <label class="form-label fw-semibold small">Hora <span class="text-danger">*</span></label>
      <input name="time" type="text" class="form-control" placeholder="09:00 - 10:30" required />
    </div>
    <div class="col-6">
      <label class="form-label fw-semibold small">Modalidad <span class="text-danger">*</span></label>
      <select name="modality" class="form-select" required>
        <option value="Presencial">Presencial</option>
        <option value="Online">Online</option>
      </select>
    </div>
    <div class="col-6">
      <label class="form-label fw-semibold small">Cupos <span class="text-danger">*</span></label>
      <input name="spots" type="number" class="form-control" min="1" max="30" placeholder="8" required />
    </div>
    <div class="col-12">
      <label class="form-label fw-semibold small">Lugar / Link <span class="text-danger">*</span></label>
      <input name="location" type="text" class="form-control" placeholder="Sala A-201 o https://meet.google.com/…" required />
    </div>
    <div class="col-6">
      <label class="form-label fw-semibold small">Duración</label>
      <input name="duration" type="text" class="form-control" placeholder="90 minutos" />
    </div>
    <div class="col-12">
      <label class="form-label fw-semibold small">Descripción</label>
      <textarea name="description" class="form-control" rows="2" placeholder="Describe el contenido…"></textarea>
    </div>
    <div class="col-12">
      <label class="form-label fw-semibold small">Requisitos</label>
      <input name="requirements" type="text" class="form-control" placeholder="Conocimientos previos…" />
    </div>
  </div>`;

  return `
  <!-- ── DETAIL MODAL ── -->
  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content border-0">
        <div class="modal-header modal-header-grad border-0">
          <h5 class="modal-title text-white fw-bold" id="detailTitle"></h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4" id="detailBody"></div>
        <div class="modal-footer border-0 pt-0" id="detailFooter"></div>
      </div>
    </div>
  </div>

  <!-- ── CREATE MODAL ── -->
  <div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content border-0">
        <div class="modal-header modal-header-grad border-0">
          <h5 class="modal-title text-white fw-bold"><i class="bi bi-plus-circle me-2"></i>Nueva Tutoría</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <form id="createSessionForm">${sessionFields}</form>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" form="createSessionForm" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Crear tutoría
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── EDIT MODAL ── -->
  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content border-0">
        <div class="modal-header modal-header-grad border-0">
          <h5 class="modal-title text-white fw-bold"><i class="bi bi-pencil me-2"></i>Editar Tutoría</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <form id="editSessionForm">${sessionFields}</form>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" form="editSessionForm" class="btn btn-primary">
            <i class="bi bi-save me-1"></i>Guardar cambios
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── DELETE CONFIRM MODAL ── -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0">
        <div class="modal-header modal-header-danger border-0">
          <h5 class="modal-title text-white fw-bold">
            <i class="bi bi-exclamation-triangle me-2"></i>Confirmar eliminación
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4 text-center">
          <i class="bi bi-trash3 text-danger d-block mb-3" style="font-size:3rem"></i>
          <p class="mb-1">¿Eliminar la tutoría de</p>
          <strong class="text-danger fs-5" id="deleteLabel"></strong>?
          <p class="text-muted small mt-2">Esta acción no se puede deshacer.</p>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
            <i class="bi bi-trash me-1"></i>Eliminar
          </button>
        </div>
      </div>
    </div>
  </div>`;
}

/* ================================================================
   INIT
================================================================ */

restoreSession();
render();

</script>
</body>
