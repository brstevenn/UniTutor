    /* ============================================================
       VARIABLES & BASE
    ============================================================ */
    :root {
      --primary:       #4F46E5;

      --secondary:     #7C3AED;
      --grad:          linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      --card-shadow:   0 4px 6px -1px rgba(0,0,0,.08), 0 2px 4px -1px rgba(0,0,0,.04);

    body { background: var(--bg); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

    /* ============================================================
       ANIMATIONS
    ============================================================ */
    .fade-in { animation: fadeIn .3s ease-out; }

      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       LOGIN
    ============================================================ */
    .login-bg {
      min-height: 100vh;
      background: var(--grad);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: #fff;
      border-radius: 1.25rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,.35);

      font-size: 1.8rem; font-weight: 900; letter-spacing: -.5px;

      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

       NAVBAR
    ============================================================ */
    .navbar-main { background: var(--grad); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .navbar-brand-custom { font-size: 1.4rem; font-weight: 800; color: #fff !important; letter-spacing: -.3px; }

    /* ============================================================
       SIDEBAR NAV
    ============================================================ */
    .sidebar { background: #fff; border-radius: 1rem; box-shadow: var(--card-shadow); overflow: hidden; }
    .nav-side .nav-link {
      color: #64748B; padding: .8rem 1.1rem;
      border-left: 3px solid transparent;
      transition: all .18s; font-weight: 500; font-size: .9rem;
      white-space: nowrap;
    }
    .nav-side .nav-link i { margin-right: .45rem; width: 1.1rem; text-align: center; }
    .nav-side .nav-link:hover  { color: var(--primary); background: #EEF2FF; border-left-color: var(--primary); }
    .nav-side .nav-link.active { color: var(--primary); background: #EEF2FF; border-left-color: var(--primary); font-weight: 700; }

    @media (max-width: 767px) {
      .nav-side { flex-direction: row !important; overflow-x: auto; }
      .nav-side .nav-link { border-left: none !important; border-bottom: 3px solid transparent; font-size: .8rem; }
      .nav-side .nav-link.active, .nav-side .nav-link:hover { border-bottom-color: var(--primary); }
    }

    /* ============================================================
       CARDS
    ============================================================ */
    .session-card {
      border: none; border-radius: 1rem;
      box-shadow: var(--card-shadow);
      transition: transform .2s, box-shadow .2s;
    }
    .session-card:hover { transform: translateY(-3px); box-shadow: var(--hover-shadow); }
    .session-card .card-header {
      background: var(--grad); color: #fff;
      border-radius: 1rem 1rem 0 0 !important;
      padding: .9rem 1.1rem;
    }

    .icon-box {
      width: 2.75rem; height: 2.75rem; border-radius: .75rem;
      display: flex; align-items: center; justify-content: center; font-size: 1.15rem;

       BADGES
    ============================================================ */

    .badge-online     { background: #D1FAE5; color: #065F46; }

       SEARCH
    ============================================================ */
    .search-input {

       PROFILE AVATAR
    ============================================================ */
    .avatar {

      display: flex; align-items: center; justify-content: center;

       TOASTS
    ============================================================ */

/** Show a Bootstrap toast notification */
function showToast(msg, type = "success") {
  const icons = {
    success: "bi-check-circle-fill",
    danger:  "bi-x-circle-fill",
    warning: "bi-exclamation-triangle-fill",
    info:    "bi-info-circle-fill",
  };
  const colors = { success: "bg-success", danger: "bg-danger", warning: "bg-warning", info: "bg-info" };
  const id = "toast-" + Date.now();
  document.getElementById("toastContainer").insertAdjacentHTML("beforeend", `
    <div id="${id}" class="toast align-items-center text-white ${colors[type]} border-0" role="alert" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body"><i class="bi ${icons[type]} me-2"></i>${msg}</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>`);
  const el = document.getElementById(id);
  const t = new bootstrap.Toast(el, { delay: 3500 });
  t.show();
  el.addEventListener("hidden.bs.toast", () => el.remove());
}

/** Simulates a delayed async API response */
function api(ms = 450) {
  return new Promise(r => setTimeout(r, ms));
}

/** Returns initials from a full name */
function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join("").toUpperCase().slice(0, 2);
}

/** Closes any open Bootstrap modals */
function closeModals() {
  document.querySelectorAll(".modal.show").forEach(m => {
    const inst = bootstrap.Modal.getInstance(m);
    if (inst) inst.hide();
  });
}

/** Read a form's fields into a plain object */
function formData(formId) {
  const obj = {};
  new FormData(document.getElementById(formId)).forEach((v, k) => (obj[k] = v));
  return obj;
}

/* ================================================================
   AUTH
================================================================ */

function doLogin(email, password) {
  // Check against dummy users first
  let user = USERS.find(u => u.email === email && u.password === password);
  if (!user) {
    // Fallback: derive role from email keyword
    if (!email) return null;
    const role = email.toLowerCase().includes("tutor") ? "tutor" : "student";
    user = { id: Date.now(), name: email.split("@")[0], email, role };
  }
  return user;
}

function saveSession(user) {
  state.currentUser = user;
  state.bookings    = [];
  localStorage.setItem("ut_user", JSON.stringify(user));
}

function logout() {
  state.currentUser    = null;
  state.bookings       = [];
  state.section        = "search";
  state.searchQuery    = "";
  state.filterSubject  = "";
  state.filterDay      = "";
  state.filterModality = "";
  localStorage.removeItem("ut_user");
  navigate_view("login");
}

function restoreSession() {
  const raw = localStorage.getItem("ut_user");
  if (raw) {
    state.currentUser = JSON.parse(raw);
    state.view = "dashboard";
  }
}

/** Book a tutoring session */
function bookSession(sessionId) {
  const sess = state.sessions.find(s => s.id === sessionId);
  if (!sess) return;
  if (sess.spots <= 0) { showToast(t("toastNoSpots"), "warning"); return; }
  const already = state.bookings.find(b => b.sessionId === sessionId && b.status !== "Cancelada");
  if (already) { showToast(t("toastAlreadyBkd"), "warning"); return; }

  api(550).then(() => {
    sess.spots--;
    state.bookings.push({
      id:        Date.now(),
      sessionId: sess.id,
      subject:   sess.subject,
      tutorName: sess.tutorName,
      day:       sess.day,
      time:      sess.time,
      modality:  sess.modality,
      location:  sess.location,
      status:    "Reservada",
      bookedAt:  new Date().toLocaleDateString("es-ES"),
    });
    showToast(t("toastBooked", tSubj(sess.subject)), "success");
    closeModals();
    renderDashboard();
  });
}

/** Cancel an existing booking */
function cancelBooking(bookingId) {
  const bk = state.bookings.find(b => b.id === bookingId);
  if (!bk) return;
  api(350).then(() => {
    bk.status = "Cancelada";
    const sess = state.sessions.find(s => s.id === bk.sessionId);
    if (sess) sess.spots++;
    showToast(t("toastCancelled"), "warning");
    renderDashboard();
  });
}

/** Create a new session (tutor only) */
function createSession(data) {
  api(450).then(() => {
    state.sessions.push({
      id:           Date.now(),
      subject:      data.subject,
      tutorName:    state.currentUser.name,
      day:          data.day,
      time:         data.time,
      modality:     data.modality,
      location:     data.location,
      spots:        +data.spots,
      totalSpots:   +data.spots,
      description:  data.description || "",
      requirements: data.requirements || "",
      duration:     data.duration || "90 minutos",
    });
    showToast(t("toastCreated", tSubj(data.subject)), "success");
    renderDashboard();
  });
}

/** Update an existing session (tutor only) */
function updateSession(id, data) {
  const sess = state.sessions.find(s => s.id === id);
  if (!sess) return;
  api(400).then(() => {
    Object.assign(sess, {
      subject:      data.subject,
      day:          data.day,
      time:         data.time,
      modality:     data.modality,
      location:     data.location,
      spots:        +data.spots,
      description:  data.description || sess.description,
      requirements: data.requirements || sess.requirements,
      duration:     data.duration || sess.duration,
    });
    showToast(t("toastUpdated"), "info");
    state.editSessionId = null;
    renderDashboard();
  });
}

/** Delete a session (tutor only) */
function deleteSession(id) {
  api(350).then(() => {
    state.sessions = state.sessions.filter(s => s.id !== id);
    state.bookings = state.bookings.filter(b => b.sessionId !== id);
    showToast(t("toastDeleted"), "danger");
    renderDashboard();
  });
}

function attachLoginHandlers() {
  /* Toggle password visibility */
  document.getElementById("togglePwd").addEventListener("click", () => {
    const inp  = document.getElementById("loginPassword");
    const icon = document.getElementById("togglePwdIcon");
    inp.type   = inp.type === "password" ? "text" : "password";
    icon.className = `bi bi-eye${inp.type === "text" ? "-slash" : ""}`;
  });

  /* Form submit */
  document.getElementById("loginForm").addEventListener("submit", e => {
    e.preventDefault();
    const email    = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    const errDiv   = document.getElementById("loginErr");
    const spinner  = document.getElementById("loginSpinner");
    const btnTxt   = document.getElementById("loginBtnTxt");

    spinner.classList.remove("d-none");
    btnTxt.textContent = t("verifying");
    errDiv.classList.add("d-none");

    api(800).then(() => {
      const user = doLogin(email, password);
      if (user) {
        saveSession(user);
        navigate_view("dashboard");
      } else {
        spinner.classList.add("d-none");
        btnTxt.textContent = t("loginBtn");
        errDiv.classList.remove("d-none");
      }
    });
  });
}

  const actionBtn = isBooked
    ? `<button class="btn btn-success btn-sm" disabled><i class="bi bi-check2 me-1"></i>${t("alreadyBooked")}</button>`
    : sess.spots > 0
      ? `<button class="btn btn-primary btn-sm flex-grow-1" onclick="bookSession(${sess.id})">
           <i class="bi bi-bookmark-plus me-1"></i>${t("book")}
         </button>`
      : `<button class="btn btn-secondary btn-sm" disabled>
           <i class="bi bi-x-circle me-1"></i>${t("noSpots")}

  return `

          <h6 class="mb-0 fw-bold text-truncate">${sess.subject}</h6>
          <small class="opacity-80"><i class="bi bi-person me-1"></i>${sess.tutorName}</small>

          <span class="badge bg-light text-dark border">
            <i class="bi bi-calendar3 me-1"></i>${tDay(sess.day)}

          <span class="badge bg-light text-dark border">
            <i class="bi bi-clock me-1"></i>${sess.time}

            <i class="bi bi-people me-1"></i>${sess.spots}/${sess.totalSpots}

function modalityBadge(modality) {
  return modality === "Presencial"
    ? `<span class="badge badge-presencial text-nowrap"><i class="bi bi-geo-alt me-1"></i>${t("inPerson")}</span>`
    : `<span class="badge badge-online text-nowrap"><i class="bi bi-wifi me-1"></i>${t("online")}</span>`;
}

/* Filter helpers */
function filteredSessions() {
  const q = state.searchQuery.toLowerCase();
  return state.sessions.filter(s => {
    const matchQ  = !q || s.subject.toLowerCase().includes(q) || s.tutorName.toLowerCase().includes(q) || s.day.toLowerCase().includes(q);
    const matchSu = !state.filterSubject  || s.subject  === state.filterSubject;
    const matchD  = !state.filterDay      || s.day      === state.filterDay;
    const matchM  = !state.filterModality || s.modality === state.filterModality;
    return matchQ && matchSu && matchD && matchM;
  });
}

function handleSearch(value) {
  state.searchQuery = value;
  refreshGrid();
}

function handleFilter(type, value) {
  if (type === "subject")  state.filterSubject  = value;
  if (type === "day")      state.filterDay      = value;
  if (type === "modality") state.filterModality = value;
  refreshGrid();
}

function refreshGrid() {
  const grid = document.getElementById("sessionsGrid");
  if (!grid) return;
  const filtered = filteredSessions();
  grid.innerHTML = filtered.length
    ? filtered.map(buildSessionCard).join("")
    : `<div class="col-12">
         <div class="empty-state bg-white rounded-3 shadow-sm">
           <i class="bi bi-search"></i>
           <h5>${t("noResults")}</h5>
           <button class="btn btn-outline-primary btn-sm mt-1" onclick="clearFilters()">
             <i class="bi bi-x-circle me-1"></i>${t("clearFilters")}
           </button>
         </div>
       </div>`;
}

function clearFilters() {
  state.searchQuery    = "";
  state.filterSubject  = "";
  state.filterDay      = "";
  state.filterModality = "";
  navigate("search");
}

      <p class="small">${t("emptyBookingsSub")}</p>
      <button class="btn btn-primary btn-sm" onclick="navigate('search')">
        <i class="bi bi-search me-1"></i>${t("searchSessions")}
      </button>
    </div>`;
  }

  const sColors = { Reservada:"primary", Cancelada:"danger", Completada:"success" };
  const sIcons  = { Reservada:"bi-calendar-check", Cancelada:"bi-calendar-x", Completada:"bi-check-circle" };

  const statusKey = { Reservada:"statusBooked", Cancelada:"statusCancelled", Completada:"statusCompleted" };
  const rows = bks.map(b => `
    <tr>
      <td class="ps-3">
        <div class="fw-semibold">${tSubj(b.subject)}</div>
        <div class="text-muted small">${b.tutorName}</div>
      </td>
      <td>
        <div>${tDay(b.day)}</div>
        <div class="text-muted small">${b.time}</div>
      </td>
      <td>${modalityBadge(b.modality)}</td>
      <td>
        <span class="badge bg-${sColors[b.status]}-subtle text-${sColors[b.status]} border border-${sColors[b.status]}-subtle">
          <i class="bi ${sIcons[b.status]} me-1"></i>${t(statusKey[b.status])}
        </span>
      </td>
      <td class="text-muted small">${b.bookedAt}</td>
      <td>
        ${b.status === "Reservada"
          ? `<button class="btn btn-outline-danger btn-sm" onclick="cancelBooking(${b.id})">
               <i class="bi bi-x-circle me-1"></i>${t("cancel")}
             </button>`
          : `<span class="text-muted">—</span>`}
      </td>
    </tr>`).join("");

  const reserved   = bks.filter(b => b.status === "Reservada").length;
  const cancelled  = bks.filter(b => b.status === "Cancelada").length;
  const completed  = bks.filter(b => b.status === "Completada").length;

  return `
  <div class="mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-calendar-check me-2 text-primary"></i>${t("myBookingsTitle")}</h4>
    <p class="text-muted small">${t("myBookingsSub", bks.length)}</p>
  </div>

  <div class="row g-3 mb-4">
    ${statCard("#EEF2FF","text-primary","bi-list-check",bks.length,t("statTotal"))}
    ${statCard("#F0FDF4","text-success","bi-calendar-check-fill",reserved,t("statActive"))}
    ${statCard("#FFF1F2","text-danger","bi-calendar-x-fill",cancelled,t("statCancelled"))}
    ${statCard("#F0FDF4","text-success","bi-check-circle-fill",completed,t("statCompleted"))}
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th class="ps-3">${t("colSession")}</th>
              <th>${t("colDayTime")}</th>
              <th>${t("colModality")}</th>
              <th>${t("colStatus")}</th>
              <th>${t("colBooked")}</th>
              <th>${t("colAction")}</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}

  <div class="mb-4">

  <div class="row g-4">
    <!-- Profile card -->

          <h6 class="mb-0 fw-bold"><i class="bi bi-info-circle me-2 text-primary"></i>${t("accountInfo")}</h6>

        <div class="card-body">
          <dl class="row mb-0 small">

            <dd class="col-7 text-muted">#${u.id}</dd>

/* ================================================================
   SECTION: TUTOR MANAGE
================================================================ */

function buildManage() {
  const mySess = state.sessions.filter(s => s.tutorName === state.currentUser.name);

  const rows = mySess.length
    ? mySess.map(s => {
        const sc = s.spots === 0 ? "danger" : s.spots <= 2 ? "warning" : "success";
        return `
        <tr>
          <td class="ps-3 fw-semibold">${tSubj(s.subject)}</td>
          <td>${tDay(s.day)}<span class="text-muted small ms-1">• ${s.time}</span></td>
          <td>${modalityBadge(s.modality)}</td>
          <td>
            <span class="badge bg-${sc}-subtle text-${sc} border border-${sc}-subtle">
              ${s.spots}/${s.totalSpots}
            </span>
          </td>
          <td>
            <div class="btn-group btn-group-sm">
              <button class="btn btn-outline-primary"  onclick="openEdit(${s.id})"   title="Editar">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-outline-danger"   onclick="askDelete(${s.id})"  title="Eliminar">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </td>
        </tr>`;
      }).join("")
    : `<tr><td colspan="5" class="text-center py-5 text-muted">
         <i class="bi bi-inbox fs-2 d-block mb-2"></i>${t("emptyManage")}
       </td></tr>`;

  return `
  <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
    <div>
      <h4 class="fw-bold mb-0"><i class="bi bi-gear me-2 text-primary"></i>${t("manageTitle")}</h4>
      <p class="text-muted small">${t("manageSub", mySess.length)}</p>
    </div>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal">
      <i class="bi bi-plus-lg me-1"></i>${t("newSession")}
    </button>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th class="ps-3">${t("colSubject")}</th>
              <th>${t("colDayTime")}</th>
              <th>${t("colModality")}</th>
              <th>${t("colSpots")}</th>
              <th>${t("colActions")}</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}

/* Open edit modal */
function openEdit(id) {
  const sess = state.sessions.find(s => s.id === id);
  if (!sess) return;
  state.editSessionId = id;

  const f = document.getElementById("editSessionForm");
  if (!f) return;
  f.querySelector("[name=subject]").value      = sess.subject;
  f.querySelector("[name=day]").value          = sess.day;
  f.querySelector("[name=time]").value         = sess.time;
  f.querySelector("[name=modality]").value     = sess.modality;
  f.querySelector("[name=location]").value     = sess.location;
  f.querySelector("[name=spots]").value        = sess.spots;
  f.querySelector("[name=description]").value  = sess.description;
  f.querySelector("[name=requirements]").value = sess.requirements;
  f.querySelector("[name=duration]").value     = sess.duration;

  new bootstrap.Modal(document.getElementById("editModal")).show();
}

/* Ask confirmation before deleting */
function askDelete(id) {
  const sess = state.sessions.find(s => s.id === id);
  if (!sess) return;
  document.getElementById("deleteLabel").textContent = sess.subject;
  document.getElementById("confirmDeleteBtn").onclick = () => {
    deleteSession(id);
    bootstrap.Modal.getInstance(document.getElementById("deleteModal"))?.hide();
  };
  new bootstrap.Modal(document.getElementById("deleteModal")).show();
}

/* ================================================================
   MODALS HTML
================================================================ */

function buildModals() {
  const subjectOpts = ES_SUBJECTS.map((s, i) => `<option value="${s}">${I18N[lang].subjects[i]}</option>`).join("");
  const dayOpts     = ES_DAYS.map((d, i)     => `<option value="${d}">${I18N[lang].days[i]}</option>`).join("");

  const sessionFields = `
  <div class="row g-3">
    <div class="col-12">
      <label class="form-label fw-semibold small">${t("fldSubject")} <span class="text-danger">*</span></label>
      <select name="subject" class="form-select" required>
        <option value="">${t("selectPlaceholder")}</option>${subjectOpts}
      </select>
    </div>
    <div class="col-6">
      <label class="form-label fw-semibold small">${t("fldDay")} <span class="text-danger">*</span></label>
      <select name="day" class="form-select" required>
        <option value="">${t("selectPlaceholder")}</option>${dayOpts}
      </select>
    </div>
    <div class="col-6">
      <label class="form-label fw-semibold small">${t("fldTime")} <span class="text-danger">*</span></label>
      <input name="time" type="text" class="form-control" placeholder="09:00 - 10:30" required />
    </div>
    <div class="col-6">
      <label class="form-label fw-semibold small">${t("fldModality")} <span class="text-danger">*</span></label>
      <select name="modality" class="form-select" required>
        <option value="Presencial">${t("inPerson")}</option>
        <option value="Online">${t("online")}</option>
      </select>
    </div>
    <div class="col-6">
      <label class="form-label fw-semibold small">${t("fldSpots")} <span class="text-danger">*</span></label>
      <input name="spots" type="number" class="form-control" min="1" max="30" placeholder="8" required />
    </div>
    <div class="col-12">
      <label class="form-label fw-semibold small">${t("fldLocation")} <span class="text-danger">*</span></label>
      <input name="location" type="text" class="form-control" placeholder="Sala A-201 o https://meet.google.com/…" required />
    </div>
    <div class="col-6">
      <label class="form-label fw-semibold small">${t("fldDuration")}</label>
      <input name="duration" type="text" class="form-control" placeholder="90 minutos" />
    </div>
    <div class="col-12">
      <label class="form-label fw-semibold small">${t("fldDesc")}</label>
      <textarea name="description" class="form-control" rows="2" placeholder="Describe el contenido…"></textarea>
    </div>
    <div class="col-12">
      <label class="form-label fw-semibold small">${t("fldReqs")}</label>
      <input name="requirements" type="text" class="form-control" placeholder="Conocimientos previos…" />
    </div>
  </div>`;

  return `
  <!-- ── DETAIL MODAL ── -->
  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content border-0">
        <div class="modal-header modal-header-grad border-0">
          <h5 class="modal-title text-white fw-bold" id="detailTitle"></h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4" id="detailBody"></div>
        <div class="modal-footer border-0 pt-0" id="detailFooter"></div>
      </div>
    </div>
  </div>

  <!-- ── CREATE MODAL ── -->
  <div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content border-0">
        <div class="modal-header modal-header-grad border-0">
          <h5 class="modal-title text-white fw-bold"><i class="bi bi-plus-circle me-2"></i>${t("modalCreate")}</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <form id="createSessionForm">${sessionFields}</form>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">${t("cancel")}</button>
          <button type="submit" form="createSessionForm" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>${t("createSession")}
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── EDIT MODAL ── -->
  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content border-0">
        <div class="modal-header modal-header-grad border-0">
          <h5 class="modal-title text-white fw-bold"><i class="bi bi-pencil me-2"></i>${t("modalEdit")}</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <form id="editSessionForm">${sessionFields}</form>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">${t("cancel")}</button>
          <button type="submit" form="editSessionForm" class="btn btn-primary">
            <i class="bi bi-save me-1"></i>${t("saveChanges")}
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── DELETE CONFIRM MODAL ── -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0">
        <div class="modal-header modal-header-danger border-0">
          <h5 class="modal-title text-white fw-bold">
            <i class="bi bi-exclamation-triangle me-2"></i>${t("modalDelete")}
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4 text-center">
          <i class="bi bi-trash3 text-danger d-block mb-3" style="font-size:3rem"></i>
          <p class="mb-1">${t("deleteQuestion")}</p>
          <strong class="text-danger fs-5" id="deleteLabel"></strong>?
          <p class="text-muted small mt-2">${t("deleteWarning")}</p>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">${t("cancel")}</button>
          <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
            <i class="bi bi-trash me-1"></i>${t("delete")}
          </button>
        </div>
      </div>
    </div>
  </div>`;
}

restoreSession();
render();
